name: Bug report
description: Report a reproducible overlay or packaging problem.
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: environment
    attributes:
      label: Environment
      description: macOS version, capture tool, and app commit or release.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
