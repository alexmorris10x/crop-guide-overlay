name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-release:
    runs-on: macos-14
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build package
        run: make package

      - name: Create checksum
        run: shasum -a 256 .build/CropGuideOverlay-macOS.zip > .build/CropGuideOverlay-macOS.zip.sha256

      - name: Attest package provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: .build/CropGuideOverlay-macOS.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: CropGuideOverlay-macOS
          path: |
            .build/CropGuideOverlay-macOS.zip
            .build/CropGuideOverlay-macOS.zip.sha256

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            .build/CropGuideOverlay-macOS.zip \
            .build/CropGuideOverlay-macOS.zip.sha256 \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
